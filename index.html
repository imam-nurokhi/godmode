<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="Nexora Support — IT Helpdesk Dashboard powered by real ticket data"/>
  <title>Nexora Support · IT Helpdesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/main.css"/>
</head>
<body>

<!-- ╔══════════════════════════════╗ -->
<!-- ║   LOADING SCREEN             ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="loading-screen">
  <div class="loader-inner">
    <div class="loader-logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="loader-logo-text">NEXORA <span>SUPPORT</span></div>
    <div class="loader-bar-wrap">
      <div class="loader-bar"></div>
    </div>
    <div class="loader-text">Initialising dashboard…</div>
  </div>
</div>

<!-- ╔══════════════════════════════╗ -->
<!-- ║   MOBILE SIDEBAR OVERLAY     ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="mob-sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ╔══════════════════════════════╗ -->
<!-- ║   LAYOUT SHELL               ║ -->
<!-- ╚══════════════════════════════╝ -->
<div class="app-shell">

  <!-- ── LEFT SIDEBAR ── -->
  <aside id="sidebar">
    <div class="sb-head">
      <svg class="sb-logo" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <div class="sb-brand">
        <span class="sb-brand-name">Nexora</span>
        <span class="sb-brand-sub">Support IT</span>
      </div>
    </div>

    <nav class="sb-nav">
      <div class="nav-section-label">DASHBOARD</div>
      <div class="nav-item active" onclick="setPage(0)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Overview</span>
      </div>

      <div class="nav-section-label">TICKETS</div>
      <div class="nav-item" onclick="setFilter('open');this.closest('.sb-nav').querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));this.classList.add('active')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <span>Open</span>
        <span id="nav-open" class="nav-badge badge-open">—</span>
      </div>
      <div class="nav-item" onclick="setFilter('in_progress');this.closest('.sb-nav').querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));this.classList.add('active')">
        <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/><circle cx="12" cy="12" r="4"/></svg>
        <span>In Progress</span>
        <span id="nav-progress" class="nav-badge badge-progress">—</span>
      </div>
      <div class="nav-item" onclick="setFilter('pending');this.closest('.sb-nav').querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));this.classList.add('active')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M10 9h4M10 15h4"/></svg>
        <span>Pending</span>
      </div>
      <div class="nav-item" onclick="setFilter('closed');this.closest('.sb-nav').querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));this.classList.add('active')">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>Closed</span>
      </div>

      <div class="nav-section-label">SYSTEM</div>
      <div class="nav-item" style="opacity:.45;pointer-events:none">
        <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
        <span>Settings</span>
      </div>
    </nav>

    <div class="sb-footer">
      <div class="sb-footer-dot online"></div>
      <span>Live Data Feed</span>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ── -->
  <main class="main-wrap">

    <!-- Top Bar -->
    <header class="topbar">
      <button class="burger" onclick="toggleSidebar()" aria-label="Menu">
        <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="topbar-title">IT Helpdesk</div>
      <div class="topbar-actions">
        <div class="search-wrap">
          <svg class="search-ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="searchQ" type="search" placeholder="Search tickets… (⌘K)" oninput="doFilter()"/>
        </div>
        <select id="catSel" onchange="doFilter()">
          <option value="">All Categories</option>
        </select>
      </div>
    </header>

    <!-- Stats Row -->
    <section id="statsGrid" class="stats-grid"></section>

    <!-- Filter Chips -->
    <div class="chip-row">
      <span class="chip-label">Filter:</span>
      <button class="chip active" data-status="" onclick="setChip(this,'')">All</button>
      <button class="chip" data-status="open" onclick="setChip(this,'open')">Open</button>
      <button class="chip" data-status="in_progress" onclick="setChip(this,'in_progress')">In Progress</button>
      <button class="chip" data-status="pending" onclick="setChip(this,'pending')">Pending</button>
      <button class="chip" data-status="closed" onclick="setChip(this,'closed')">Closed</button>
      <span id="resultCount" class="result-count"></span>
    </div>

    <!-- Content area: ticket list + right panel -->
    <div class="content-body">

      <!-- Ticket list -->
      <section class="ticket-section">
        <div id="ticketList" class="ticket-list"></div>
        <div id="pager" class="pager"></div>
      </section>

      <!-- Right panel -->
      <aside id="rightPanel" class="right-panel"></aside>
    </div>

  </main><!-- /main-wrap -->
</div><!-- /app-shell -->

<!-- ╔══════════════════════════════╗ -->
<!-- ║   MOBILE BOTTOM NAV          ║ -->
<!-- ╚══════════════════════════════╝ -->
<nav class="bottom-nav">
  <div class="bnav-item active" onclick="setPage(0)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <span>Dashboard</span>
  </div>
  <div class="bnav-item" onclick="setFilter('open')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    <span>Open</span>
  </div>
  <div class="bnav-item" onclick="setFilter('in_progress')">
    <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/><circle cx="12" cy="12" r="4"/></svg>
    <span>Progress</span>
  </div>
  <div class="bnav-item" onclick="setFilter('closed')">
    <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span>Closed</span>
  </div>
</nav>

<!-- ╔══════════════════════════════╗ -->
<!-- ║   DETAIL DRAWER OVERLAY      ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-drawer">
    <header class="drawer-header">
      <span class="drawer-title">Ticket Detail</span>
      <button class="drawer-close" onclick="document.getElementById('detail-overlay').classList.remove('show');state.selectedId=null;renderList()" aria-label="Close">✕</button>
    </header>
    <div id="drawerBody" class="drawer-body"></div>
  </div>
</div>

<script src="assets/js/app.js" defer></script>
</body>
</html>
